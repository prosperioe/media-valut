{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Create Folder - MediaVault{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="content-card p-4 p-md-5">
            <h4 class="fw-bold mb-4"><i class="bi bi-folder-plus text-accent"></i> Create New Folder</h4>
            <form method="post" novalidate>
                {% csrf_token %}
                {{ form|crispy }}
                <div class="mt-4 d-flex justify-content-between">
                    <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">Cancel</a>
                    <button type="submit" class="btn btn-info fw-bold">Create Folder</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
