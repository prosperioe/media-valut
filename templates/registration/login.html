{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Login - MediaVault{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="content-card p-4 p-md-5">
            <h3 class="fw-bold mb-4 text-center text-deep-blue">Welcome Back</h3>
            
            <form method="post">
                {% csrf_token %}
                {{ form|crispy }}
                <button type="submit" class="btn btn-info w-100 mt-4 fw-bold shadow-sm">Log In</button>
            </form>
            
            <div class="text-center mt-4">
                <small class="text-secondary">Don't have an account? <a href="{% url 'register' %}" class="text-accent text-decoration-none">Sign up here</a>.</small>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const passwordInputs = document.querySelectorAll('input[type="password"]');
    
    passwordInputs.forEach(function(input) {
        const wrapper = document.createElement('div');
        wrapper.className = 'input-group';
        
        input.parentNode.insertBefore(wrapper, input);
        wrapper.appendChild(input);
        
        const button = document.createElement('button');
        button.className = 'btn btn-outline-secondary';
        button.type = 'button';
        
        const icon = document.createElement('i');
        icon.className = 'bi bi-eye';
        button.appendChild(icon);
        
        button.addEventListener('click', function() {
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('bi-eye-slash', 'bi-eye');
            }
        });
        
        wrapper.appendChild(button);
    });
});
</script>
{% endblock %}
